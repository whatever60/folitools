name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fail fast if someone tags a version that doesn't match pyproject.toml.
  check-version:
    name: Check tag ↔ pyproject.toml version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compare versions
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag=$tag_version pyproject=$package_version"
          if [ "$tag_version" != "$package_version" ]; then
            echo "::error::tag $tag_version does not match pyproject.toml $package_version"
            exit 1
          fi

  # Linux x86_64 wheel inside a manylinux container so the Rust-htslib build
  # picks up the standard compatible toolchain and libs (zlib, bz2, xz).
  build-wheel-linux:
    name: Build wheel (linux x86_64, manylinux_2_28)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          manylinux: "2_28"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/*.whl

  # macOS universal2 wheel so a single artifact works on Intel + Apple Silicon.
  build-wheel-macos:
    name: Build wheel (macOS universal2)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --target universal2-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-universal2
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs:
      - check-version
      - build-wheel-linux
      - build-wheel-macos
      - build-sdist
    # check-version only runs on tag pushes; let workflow_dispatch proceed
    # without it by marking it a non-blocking need.
    if: |
      always() &&
      (needs.check-version.result == 'success' || needs.check-version.result == 'skipped') &&
      needs.build-wheel-linux.result == 'success' &&
      needs.build-wheel-macos.result == 'success' &&
      needs.build-sdist.result == 'success'
    permissions:
      id-token: write
    environment: testpypi

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "wheel-*"
          path: dist
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi
    # Only publish to real PyPI on actual tag releases, not manual runs.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    environment: pypi

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "wheel-*"
          path: dist
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
