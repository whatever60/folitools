name: folitools
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.12
  - pip
  - rust
  - gcc
  - fastp
  # cutadapt is installed from our fork via pip (see pyproject.toml); do not
  # bring in the PyPI/bioconda package here as it would shadow the fork.
  - samtools
  - bwa-mem2
  - star
  - seqkit
  - fastqc
  - subread
  - sambamba
  - pigz
  - scanpy
  - rpy2
  - r-base>=4
  - r-essentials
  - r-irkernel
  - r-biocmanager  # For installing non-conda R packages
  - r-devtools  # For installing non-conda R packages
  - bioconductor-deseq2
  - bioconductor-sva
  - bioconductor-edgeR
  - bioconductor-limma
  - bioconductor-batchqc
  - bioconductor-toast  # dependency for MuSiC
  - r-rcurl  # dependency for BayesPrism
  - autogenes
  - xbioc  # dependency for SCDC
  - r-bisquerna
  # - r-bseqsc  # Dependencies too old
  - bioconductor-deconrnaseq
  - r-dwls
